version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: iiifl_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: iiifl_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/init.sql # Auto-runs schema on first startup

  pgadmin:
    image: dpage/pgadmin4
    container_name: iiifl_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@iiifl.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
